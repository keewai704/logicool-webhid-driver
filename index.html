<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Logicool G HUB On-board</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">G</span>
          <div>
            <p>Logicool</p>
            <h1>ON-BOARD MEMORY MODE</h1>
          </div>
        </div>
        <p id="status" data-kind="idle">ready</p>
        <div class="toolbar">
          <button id="connect" type="button">接続</button>
          <button id="refresh" type="button">更新</button>
          <button id="applyOnboardProfile" type="button" class="primary">保存</button>
        </div>
      </header>

      <div class="workspace">
        <aside class="device-panel">
          <div class="device-visual" aria-hidden="true">
            <div class="mouse-shell">
              <span class="mouse-line"></span>
              <span class="mouse-wheel"></span>
              <span class="mouse-mark"></span>
            </div>
          </div>
          <dl class="device-facts">
            <dt>DEVICE</dt>
            <dd id="deviceName">未接続</dd>
            <dt>USB</dt>
            <dd id="deviceIds">-</dd>
            <dt>HID++</dt>
            <dd id="protocol">-</dd>
          </dl>
          <div class="status-grid">
            <div>
              <span>MEMORY</span>
              <strong id="onboardBadge" data-state="idle">STANDBY</strong>
            </div>
            <div>
              <span>PROFILE</span>
              <strong id="profileStatus">-</strong>
            </div>
            <div>
              <span>DPI SLOT</span>
              <strong id="dpiSlotStatus">-</strong>
            </div>
          </div>
          <div id="capabilityList" class="capability-list" aria-label="対応項目"></div>
        </aside>

        <section class="settings-grid">
          <section id="onboardPanel" class="panel span-12" hidden>
            <div class="panel-heading">
              <div>
                <span class="eyebrow">ON-BOARD PROFILE</span>
                <h2>メモリスロット</h2>
              </div>
              <span id="onboardMeta" class="meta-pill">-</span>
            </div>
            <div class="controls">
              <label>
                プロファイル
                <select id="profileSlot"></select>
              </label>
              <button id="setCurrentProfile" type="button">選択</button>
              <label>
                DPIスロット
                <select id="dpiSlot"></select>
              </label>
              <button id="setDpiSlot" type="button">選択</button>
            </div>
          </section>

          <section id="dpiPanel" class="panel span-6" hidden>
            <div class="panel-heading">
              <div>
                <span class="eyebrow">SENSITIVITY</span>
                <h2>DPI</h2>
              </div>
              <output id="sensorDpiValue" class="value-readout">1600</output>
            </div>
            <div class="controls">
              <label>
                センサー
                <select id="dpiSensorIndex"></select>
              </label>
              <label>
                プリセット
                <select id="dpiPreset"></select>
              </label>
            </div>
            <label class="slider-field">
              <span>DPI</span>
              <input id="sensorDpi" type="range" min="100" max="25600" step="50" value="1600" />
            </label>
            <div class="panel-footer">
              <span id="dpiSensorMeta" class="setting-meta">-</span>
              <button id="setSensorDpi" type="button">適用</button>
            </div>
          </section>

          <section id="reportRatePanel" class="panel span-6" hidden>
            <div class="panel-heading">
              <div>
                <span class="eyebrow">POLLING</span>
                <h2>レポートレート</h2>
              </div>
              <output id="reportRateValue" class="value-readout">1000 Hz</output>
            </div>
            <div class="controls">
              <label>
                レート
                <select id="reportRateMs">
                  <option value="1">1000 Hz</option>
                  <option value="2">500 Hz</option>
                  <option value="4">250 Hz</option>
                  <option value="8">125 Hz</option>
                </select>
              </label>
            </div>
            <label class="slider-field">
              <span>RATE</span>
              <input id="reportRateSlider" type="range" min="0" max="3" step="1" value="0" />
            </label>
            <div class="panel-footer">
              <span id="reportRateText" class="setting-meta">-</span>
              <button id="setReportRate" type="button">適用</button>
            </div>
          </section>

          <section class="panel span-12 hits-panel">
            <div class="panel-heading">
              <div>
                <span class="eyebrow">SUPERSTRIKE HITS</span>
                <h2>アクチュエーション</h2>
              </div>
              <span id="hitsSummary" class="meta-pill">-</span>
            </div>
            <div class="hits-grid">
              <label>
                ターゲット
                <select id="hitsTarget">
                  <option value="both">左 + 右</option>
                  <option value="left">左</option>
                  <option value="right">右</option>
                </select>
              </label>
              <label class="slider-field">
                <span>ACTUATION</span>
                <output id="hitsActuationValue">3</output>
                <input id="hitsActuation" type="range" min="1" max="10" step="1" value="3" />
              </label>
              <label class="toggle-field">
                <input id="hitsRapidEnabled" type="checkbox" checked />
                <span>Rapid Trigger</span>
              </label>
              <label class="slider-field">
                <span>RAPID</span>
                <output id="hitsRapidValue">1</output>
                <input id="hitsRapid" type="range" min="1" max="5" step="1" value="1" />
              </label>
              <label class="slider-field">
                <span>HAPTICS</span>
                <output id="hitsHapticsValue">1</output>
                <input id="hitsHaptics" type="range" min="0" max="5" step="1" value="1" />
              </label>
            </div>
            <div class="panel-footer">
              <span id="hitsFramePreview" class="setting-meta">-</span>
              <button id="applyCapturedHits" type="button">適用</button>
            </div>
          </section>

          <section class="panel span-12 log-panel">
            <div class="panel-heading">
              <div>
                <span class="eyebrow">SYSTEM</span>
                <h2>Log</h2>
              </div>
            </div>
            <pre id="log" class="mono log"></pre>
          </section>
        </section>
      </div>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
